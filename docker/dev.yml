# Mustafar Dev Stack
# VS Code Server · PostgreSQL · Redis
# Run: docker compose -f docker/dev.yml up -d

services:

  # ── Browser-based VS Code ─────────────────────
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - PASSWORD=changeme        # ← change this before running
      - SUDO_PASSWORD=changeme   # ← change this before running
    volumes:
      - code_server_config:/config
      - /Volumes/Mustafar-Dev/projects:/projects
    ports:
      - "8443:8443"
    # Access: http://localhost:8443

  # ── PostgreSQL for local dev ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mustafar
      POSTGRES_PASSWORD: changeme   # ← change this
      POSTGRES_DB: dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mustafar-dev

  # ── Redis for caching / queues ────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mustafar-dev

networks:
  mustafar-dev:
    driver: bridge

volumes:
  code_server_config:
  postgres_data:
  redis_data:
